services:
  - type: web
    name: celebration-qr-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: celebration_db
      - key: CORS_ORIGINS
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false

  - type: web
    name: celebration-qr-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://celebration-qr-backend.onrender.com
      - key: REACT_APP_FRONTEND_URL
        value: https://celebration-qr-frontend.onrender.com
