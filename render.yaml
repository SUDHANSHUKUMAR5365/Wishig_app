services:
  - type: web
    name: celebration-qr-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: celebration_db
      - key: CORS_ORIGINS
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
